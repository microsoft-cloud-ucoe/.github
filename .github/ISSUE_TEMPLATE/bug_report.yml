name: Bug report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1) … 2) …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: bash
