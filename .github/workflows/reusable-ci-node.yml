name: Reusable CI (Node)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version
        required: false
        type: string
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then npm ci; else echo "No package.json; skipping"; fi
      - name: Run tests (if test script exists)
        run: |
          if [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then npm test --if-present; else echo "No test script; skipping"; fi
