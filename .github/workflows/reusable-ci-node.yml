name: Reusable CI (Node)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version
        required: false
        type: string
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then \
            if [ -f package-lock.json ]; then \
              echo "Using npm ci"; npm ci; \
            else \
              echo "No package-lock.json; using npm install --no-audit --no-fund"; npm install --no-audit --no-fund; \
            fi; \
          else \
            echo "No package.json; skipping"; \
          fi
      - name: Run tests (if test script exists)
        run: |
          if [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" >/dev/null 2>&1; then \
            npm test --if-present; \
          else \
            echo "No test script; skipping"; \
          fi
