name: Reusable CI (Node.js)

on:
  workflow_call:
    inputs:
      node-version:
        description: Node version
        required: false
        type: string
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present
