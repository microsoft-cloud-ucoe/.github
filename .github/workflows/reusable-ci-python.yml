name: Reusable CI (Python)

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        required: false
        type: string
        default: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
      - name: Install dependencies (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then python -m pip install -U pip && pip install -r requirements.txt; else echo "No requirements.txt; skipping"; fi
      - name: Run tests (pytest if present)
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q || true; else echo "pytest not installed; skipping"; fi
